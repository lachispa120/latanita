<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tanita - Demo Carta</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0a0a0a;
            --fondo-secundario: #161616;
            --primario: #B52D28;
            --texto-oro: #d4af37;
            --texto-principal: #f2f2f2;
            --texto-muted: #888;
            --borde: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--fondo);
            color: var(--texto-principal);
            line-height: 1.6;
        }

        /* WHATSAPP */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 20px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-decoration: none;
        }

        /* HEADER */
        header {
            background-color: var(--fondo);
            padding: 30px 15px 10px;
            text-align: center;
        }

        .logo-header { max-width: 180px; height: auto; margin-bottom: 20px; }

        .lang-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            gap: 5px;
        }

        .lang-btn img { 
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid #333; object-fit: cover;
        }

        /* HORARIOS A SIMPLE VISTA */
        .horarios-top {
            background: var(--fondo-secundario);
            border: 1px solid var(--borde);
            padding: 15px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .horarios-top p {
            font-size: 0.85rem;
            color: var(--texto-oro);
            font-weight: 600;
            margin: 2px 0;
        }

        /* ACORDEÓN DE CATEGORÍAS */
        .menu-content { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .category-wrapper {
            margin-bottom: 12px;
            border: 1px solid var(--borde);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--fondo-secundario);
        }

        .category-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--texto-principal);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .arrow {
            width: 10px; height: 10px;
            border-right: 2px solid var(--texto-muted);
            border-bottom: 2px solid var(--texto-muted);
            transform: rotate(45deg);
            transition: 0.3s;
        }

        .category-wrapper.active { border-color: var(--primario); }
        .category-wrapper.active .arrow { transform: rotate(-135deg); border-color: var(--primario); }
        .category-wrapper.active .category-title { color: var(--primario); }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background-color: #0d0d0d;
        }

        .category-wrapper.active .category-content {
            max-height: 1500px;
            padding: 10px 20px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .item-title { font-weight: 700; color: #fff; font-size: 1rem; }
        .item-desc { font-size: 0.85rem; color: var(--texto-muted); }
        .item-price { color: var(--texto-oro); font-weight: 700; }

        /* FOOTER */
        footer {
            background-color: var(--fondo-secundario);
            padding: 50px 20px;
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid var(--borde);
        }

        .map-container {
            width: 100%; height: 250px; margin: 25px 0; border-radius: 8px; overflow: hidden;
        }

        .copyright {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/541131756784?text=Hola%20buenas" class="whatsapp-float" target="_blank">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93a7.898 7.898 0 0 0-2.327-5.607zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.17-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <header>
        <img src="https://i.postimg.cc/jjmfC1c6/image.png" alt="La Tanita" class="logo-header">
        
        <div class="lang-container">
            <button class="lang-btn" onclick="changeLang('es')">
                <img src="https://flagcdn.com/w80/es.png" alt="ES"> ES
            </button>
            <button class="lang-btn" onclick="changeLang('en')">
                <img src="https://flagcdn.com/w80/gb.png" alt="EN"> EN
            </button>
        </div>

        <div class="horarios-top">
            <p>Martes a Domingo</p>
            <p>12 hs. a 16 hs. | 20 hs. a 01 hs.</p>
        </div>
    </header>

    <main class="menu-content" id="accordion">
        <script>
            const categorias = [
                {es: "Entradas", en: "Appetizers"},
                {es: "Pastas", en: "Pastas"},
                {es: "Salsas", en: "Sauces"},
                {es: "Estofados al Tuco", en: "Stews"},
                {es: "Postres", en: "Desserts"},
                {es: "Cafetería", en: "Coffee Shop"},
                {es: "Bebidas", en: "Drinks"},
                {es: "Vinos", en: "Wines"},
                {es: "Despensa", en: "Market"}
            ];

            const accordion = document.getElementById('accordion');

            categorias.forEach(cat => {
                const wrapper = document.createElement('div');
                wrapper.className = 'category-wrapper';
                wrapper.innerHTML = `
                    <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                        <span class="category-title" data-es="${cat.es}" data-en="${cat.en}">${cat.es}</span>
                        <div class="arrow"></div>
                    </div>
                    <div class="category-content">
                        <div class="menu-item">
                            <div class="info">
                                <span class="item-title" data-es="Producto Demo" data-en="Demo Product">Producto Demo</span>
                                <p class="item-desc" data-es="Descripción demo del plato." data-en="Demo dish description.">Descripción demo del plato.</p>
                            </div>
                            <span class="item-price">$000</span>
                        </div>
                    </div>
                `;
                accordion.appendChild(wrapper);
            });

            function changeLang(lang) {
                const elements = document.querySelectorAll('[data-es]');
                elements.forEach(el => {
                    el.innerText = el.getAttribute('data-' + lang);
                });
            }
        </script>
    </main>

    <footer>
        <p><strong>Colón 272, Quilmes</strong></p>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3278.4354833282434!2d-58.25983762425394!3d-34.71941617291417!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a32e6a6460975d%3A0x6e9a65f9733c7069!2zQ29sw7NuIDI3MiwgQjE4NzhaRkQgUXVpbG1lcywgUHJvdmluY2lhIGRlIEJ1ZW5vcyBBaXJlcw!5e0!3m2!1ses!2sar!4v1709580000000!5m2!1ses!2sar" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <p class="copyright">© 2026 La Tanita - Quilmes</p>
    </footer>

</body>
</html>
